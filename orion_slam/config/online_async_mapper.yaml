---

slam_toolbox:
  ros__parameters:
    # --------------------- MODE INFO OF SLAM --------------------------------
    mode: mapping
    debug_logging: false

    # ----------------------------- SOLVER CONFIGURATIONS ---------------------
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ------------------------- FRAMES CONFIGURATION --------------------------
    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # ------------------------ SCAN PARAMETERS --------------------------------
    min_laser_range: 0.5   # Avoids detecting the robot body at close range
    max_laser_range: 5.0   # Shorter than AMCL range; prioritizes mapping accuracy over coverage
    scan_topic: /scan_filtered  # Filtered scan: conflicting robot collision ranges removed
    scan_buffer_size: 10
    scan_queue_size: 1  # Should always be one during async mode

    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # ---------------------- LOOP CLOSURE CONFIGURATION ----------------------

    # A loop closure aims to reduce accumulated error when considering an
    # already mapped section by aligning the current scan and comparing. Here
    # consists of:
    # - Coarse: Broader, less precise each to identify potential candidates.
    # - Fine: For refining candidate identification in a more detailed way.

    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # -------------------------- POSE PARAMETERS ------------------------------
    transform_publish_period: 0.02
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.3
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000  # bytes
    use_scan_matching: true  # Whether to use scan to refine odometry
    use_scan_barycenter: true  # Whether to use the barycenter or scan pose
    distance_variance_penalty: 0.5  # Distance penalty when scan differs from odom
    angle_variance_penalty: 1.0  # Angle penalty when scan differs from odom
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5

    # ------------------------- MAP PARAMS ------------------------------------
    enable_interactive_mode: true  # Will retain laser cache, valid for mapping
    resolution: 0.025  # meters per pixel
    map_update_interval: 1.0
    use_response_expansion: true  # Whether to update grid size if no match

    fine_search_angle_offset: 0.00349   # For testing fine scan matching
    coarse_search_angle_offset: 0.349   # For testing coarse scan matching
    coarse_angle_resolution: 0.0349

    # -------------------------- SPACE PARAMS ---------------------------------
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1  # For smooth out responses
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03  # For smooth out responses
